{% extends "base.html" %}
{% block title %}登入 - 訂閱網站更新監測{% endblock %}
{% block content %}
<div class="auth-box">
    <h1>登入</h1>
    <form method="post" action="{{ url_for('auth.login') }}">
        <label>信箱 <input type="email" name="email" required placeholder="you@example.com"></label>
        <label>密碼 <input type="password" name="password" required></label>
        <button type="submit">登入</button>
    </form>
    <p class="auth-link"><a href="{{ url_for('auth.register') }}">還沒有帳號？註冊</a></p>
</div>
{% endblock %}
