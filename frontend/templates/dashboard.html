{% extends "base.html" %}
{% block title %}我的訂閱 - 訂閱網站更新監測{% endblock %}
{% block content %}
<div class="dashboard">
    <h1>我的追蹤網站</h1>
    <p class="dashboard-desc">新增網址並描述你想「觀看是否有更新」的區塊，系統會定時檢查並在有變更時讓你查看差異。</p>

    <div class="dashboard-grid">
        <aside class="dashboard-aside">
            <section class="panel panel-compact">
                <div class="panel-header">
                    <h2>常用清單</h2>
                    <div class="meta">每日更新 / 動態網站 / 不定時更新 / 每月更新 / 每季更新</div>
                </div>
                <div id="preset-list" class="preset-list"></div>
            </section>
        </aside>

        <div class="dashboard-main">
            <section class="notifications">
                <div class="panel-header">
                    <h2>最新通知 <span id="unread-count" class="unread-badge" style="display:none;"></span></h2>
                    <div class="notification-actions">
                        <button id="btn-delete-all-notifications" type="button" class="btn-delete-all-notifications danger">刪除所有通知</button>
                        <div id="expand-notifications" class="expand-link" style="display:none;">展開全部</div>
                    </div>
                </div>
                <div id="notif-list"></div>
            </section>

            <section class="add-subscription">
                <h2>新增追蹤</h2>
                <form id="form-add-sub">
                    <label>網址 <input type="url" id="sub-url" required placeholder="https://example.com/page"></label>
                    <label>自訂名稱（選填）<input type="text" id="sub-name" placeholder="例如：台大公告、產品頁"></label>
                    <label>要觀看是否有更新的部分（選填）<br><small>例如：公告列表、最新消息區塊、價格表。留空則監測整頁變更。系統會搭配 AI 擷取你描述的區塊。</small><textarea id="sub-watch" rows="3" placeholder="例：頁面上的「最新公告」列表"></textarea></label>
                    <label>自動檢查頻率
                        <select id="sub-interval">
                            <option value="60">每小時</option>
                            <option value="1440" selected>每天</option>
                            <option value="10080">每週</option>
                            <option value="43200">每月</option>
                            <option value="129600">每季</option>
                            <option value="525600">每年</option>
                            <option value="custom">自訂（分鐘）</option>
                        </select>
                        <input type="number" id="sub-interval-custom" min="1" step="1" placeholder="輸入分鐘，例如 720" style="display:none; margin-top:8px;">
                    </label>
                    <button type="submit">新增</button>
                </form>
            </section>

            <section class="subscription-list">
                <h2>目前追蹤</h2>
                <div class="list-actions">
                    <button id="btn-check-all" type="button" class="btn-check-all primary">全部檢查</button>
                    <button id="btn-delete-all" type="button" class="btn-delete-all danger">全部刪除</button>
                </div>
                <div id="sub-list"></div>
            </section>

            <section class="subscription-list">
                <h2>疑似反爬網站紀錄</h2>
                <div id="blocked-list" class="meta">尚無紀錄。</div>
            </section>
        </div>
    </div>
</div>
<script src="/static/dashboard.js"></script>
{% endblock %}
